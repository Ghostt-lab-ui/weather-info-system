<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Information System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Weather Information System</h1>
        
        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..." 
                class="search-box"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="saveBtn">Save Location</button>
        </div>

        <div id="weatherContainer" class="weather-container">
            <p class="no-data">Enter a city to see the weather</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
